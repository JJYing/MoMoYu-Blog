<!DOCTYPE html>
<html lang="zh-CN">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<link rel="canonical" href="{{ .Permalink }}">
		<meta name="description" content="摸摸鱼研究局是摸摸鱼计时器开发者 JJ 的开发日志与实验记录，记录 macOS 菜单栏应用的设计、开发、运营与独立开发者的创作轨迹。">
    <meta name="robots" content="index,follow">
    <meta property="og:locale" content="zh_CN">
		<meta property="og:title" content="{{ if and .Title (not .IsHome) }}{{ .Title }} - {{ end }}{{ .Site.Title }}">
		<meta property="og:description" content="{{ .Description | default .Site.Params.description }}">
		<meta property="og:url" content="{{ .Permalink }}">
		<meta property="og:type" content="{{ if .IsHome }}website{{ else }}article{{ end }}">
		<meta property="og:image" content="{{ "https://blog.momoyu.app/assets/images/og.jpg" | relURL }}">
		<meta property="og:site_name" content="{{ .Site.Title }}">

		<meta name="twitter:card" content="summary_large_image">
		<meta name="twitter:title" content="{{ if and .Title (not .IsHome) }}{{ .Title }} - {{ end }}{{ .Site.Title }}">
		<meta name="twitter:description" content="{{ .Description | default .Site.Params.description }}">
		<meta name="twitter:url" content="{{ .Permalink }}">
		<meta name="twitter:image" content="{{ "https://blog.momoyu.app/assets/images/og.jpg" | relURL }}">

		<link rel="preconnect" href="https://s.anyway.red" crossorigin/>
		<link rel="icon" href="https://s.anyway.red/momoyu/favicon.png">

		<link rel="stylesheet" href="https://s.anyway.red/momoyu/fontawesome.css">
		<link rel="stylesheet" href="https://s.anyway.red/font/alihealth2/regular/regular.css">
		<link rel="stylesheet" href="https://s.anyway.red/font/alihealth2/bold/bold.css">

		<title>{{ if and .Title (not .IsHome) }}{{ .Title }} - {{ end }}{{ .Site.Title }}</title>
		{{ with .OutputFormats.Get "RSS" }}
			<link rel="alternate" type="application/rss+xml" title="{{ $.Site.Title }}" href="{{ .RelPermalink }}">
		{{ end }}
		{{ $css := resources.Get "css/blog.css" | fingerprint }}
		<link rel="stylesheet" href="{{ $css.RelPermalink }}" integrity="{{ $css.Data.Integrity }}" crossorigin="anonymous">
		<script defer type="module" src="{{ "/assets/js/main.js" | relURL }}"></script>
    <script>
      window.anyclicksQueue = window.anyclicksQueue || [];   
    </script>
    <script defer src="https://anyclicks.anyway.fm/js/tracker.js" data-site-id="0858e1a9201afa625171ac2e"></script>
	</head>
	<body>
		{{ block "main" . }}{{ end }}
		<footer class="blog-footer">
			<div class="blog-footer-inner">
				<div class="blog-footer-links">
					<a href="https://momoyu.app" target="_blank" rel="noopener">首页</a>
					<em>·</em>
					<a href="https://vote.momoyu.app/" target="_blank" rel="noopener">功能建议 & 投票</a>
					{{ with .OutputFormats.Get "RSS" }}
						<em>·</em>
						<a href="{{ .RelPermalink }}">RSS</a>
					{{ end }}
				</div>
				<div class="blog-footer-copy">
					<p>&copy; {{ now.Year }} JJ Ying 保留所有权利</p>
				</div>
			</div>
		</footer>
    <script type="application/ld+json">
      {
      "@context": "https://schema.org",
      "@type": "Blog",
      "name": "摸摸鱼研究局",
      "url": "https://blog.momoyu.app",
      "description": "摸摸鱼计时器开发日志",
      "author": {
        "@type": "Person",
        "name": "JJ Ying"
      }
      }
      </script>
	</body>
</html>
